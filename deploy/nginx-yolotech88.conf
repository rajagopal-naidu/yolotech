# /etc/nginx/sites-available/yolotech88
# Static site for Yolotech88. Symlink into sites-enabled, then `nginx -t && systemctl reload nginx`.
# Certbot will rewrite/extend this file to add the HTTPS (443) server block automatically.
#
# This config ONLY responds to yolotech88.com / www.yolotech88.com (explicit server_name,
# NOT a default_server) — it cannot affect vendora88.com. Root points at the git checkout,
# so `git pull` in /home/ubuntu/yolotech deploys the site instantly.

server {
    listen 80;
    listen [::]:80;

    server_name yolotech88.com www.yolotech88.com;

    # Serve straight from the cloned repo so `git pull` = deploy.
    root /home/ubuntu/yolotech;
    index index.html;

    # Don't expose repo internals / deploy scripts / docs over the web.
    location ~ /\.(git|gitignore|gitattributes) { deny all; }
    location ^~ /deploy/ { deny all; }
    location = /README.md { deny all; }

    # SPA-ish fallback (single page, so just serve index.html if a path is missing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (filenames are stable; bump on deploy if needed)
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # Gzip for text assets
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
